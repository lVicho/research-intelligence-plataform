services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: research-intelligence-postgres
    environment:
      POSTGRES_DB: research_intelligence
      POSTGRES_USER: research
      POSTGRES_PASSWORD: research
    ports:
      - "5432:5432"
    volumes:
      - research-intelligence-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U research -d research_intelligence"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  research-intelligence-postgres-data:
